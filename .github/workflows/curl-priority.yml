name: Scheduled cURLs (priority)

on:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  curl:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v4
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install tor -y
      - name: Percent-encode non-ASCII characters in target URLs
        run: |
          ROOT=$(git rev-parse --show-toplevel)
          cat $ROOT/target_priority | node $ROOT/process.js > $ROOT/target_priority_processed
      - name: Request archiving of target URLs
        run: xargs -I {} curl --retry 10 --retry-connrefused --retry-delay 60 --socks5-hostname 127.0.0.1:9050 -fIvsS {} < $(git rev-parse --show-toplevel)/target_priority_processed
