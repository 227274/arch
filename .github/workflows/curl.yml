name: Scheduled cURLs

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  curl:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v4
      - name: Percent-encode non-ASCII characters in target URLs
        run: |
          ROOT=$(git rev-parse --show-toplevel)
          cat $ROOT/target | node $ROOT/process.js > $ROOT/target_processed
      - name: Request archiving of target URLs
        run: xargs -I {} curl --retry 10 --retry-connrefused --retry-delay 60 -fIsS {} < $(git rev-parse --show-toplevel)/target_processed
